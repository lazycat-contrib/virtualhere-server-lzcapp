application:
  subdomain: virtualhere-server
  background_task: true
  usb_accel: true
  public_path:
    - /
  upstreams:
    - location: /
      backend: file:///lzcapp/pkg/content/help.html
  ingress:
    - protocol: tcp
      port: 7575
      service: virtualhere-server

services:
  virtualhere-server:
    # czyt/virtualhere-server:4.8.7
    image: registry.lazycat.cloud/czyt/czyt/virtualhere-server:e8446242a8606bd6
    binds:
      - /lzcapp/var/data:/data
